<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"
     stroke-linecap="round" stroke-linejoin="round">

  <!-- White rounded background -->
  <rect x="1" y="1" width="62" height="62" rx="8" fill="#ffffff"/>

  <!-- ===== Score bar (red | blue), equal widths, aligned with board ===== -->
  <rect x="8"  y="4" width="22" height="9" rx="2" fill="#dc2626"/>
  <rect x="34" y="4" width="22" height="9" rx="2" fill="#2563eb"/>
  <g font-family="Arial Black, Arial, sans-serif" font-weight="900"
     font-size="7" fill="#ffffff">
    <text x="11" y="11">20</text>
    <text x="45" y="11">13</text>
  </g>

  <!-- ===== 3x3 Sudoku board: perfect 48x48 square, cells 16x16 ===== -->
  <!-- Outer rounded frame (tabler icon style) -->
  <path d="M8 16 a2 2 0 0 1 2 -2 h44 a2 2 0 0 1 2 2 v44 a2 2 0 0 1 -2 2 h-44 a2 2 0 0 1 -2 -2 v-44"
        fill="#ffffff" stroke="#0f172a" stroke-width="2.2"/>

  <!-- Inner 3x3 grid lines, splitting the 48x48 square into nine equal 16x16 cells -->
  <g stroke="#0f172a" stroke-width="2" fill="none">
    <line x1="24" y1="14" x2="24" y2="62"/>
    <line x1="40" y1="14" x2="40" y2="62"/>
    <line x1="8"  y1="30" x2="56" y2="30"/>
    <line x1="8"  y1="46" x2="56" y2="46"/>
  </g>
</svg>
