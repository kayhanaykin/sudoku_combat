events {
	worker_connections 1024;
}

# mime.types to set the correct Content-Type header 
# so the browser renders images instead of downloading them
http {
	include       /etc/nginx/mime.types;
	default_type  application/octet-stream;
	
# The HTTP/1.1 spec defines two categories of headers:
# End-to-end headers → forwarded through all proxies to the final destination
# Hop-by-hop headers → meant only for the immediate recipient, stripped before forwarding
# Upgrade is a hop-by-hop header
# Connection: upgrade      →  "I want to change protocols"
# Upgrade: websocket       →  "I want to switch to WebSocket specifically"

	map $http_upgrade $connection_upgrade {
		default upgrade;
		''      close;
	}
# _ is a special nginx convention meaning "match any hostname"
	server {
		listen 80;
		server_name _;
		return 301 https://$host:8443$request_uri;
	}

	server {
		listen 443 ssl;
		server_name _;

		ssl_certificate /etc/nginx/certs/server.crt;
		ssl_certificate_key /etc/nginx/certs/server.key;
		ssl_protocols TLSv1.2 TLSv1.3;
# When nginx proxies a request to a backend, 
# y default it replaces the Host header with the upstream server name.
# Nginx directive for passing the client's real IP address to a backend application
		# 1. Frontend & Vite HMR
		location / {
			proxy_pass http://frontend:5173;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection $connection_upgrade;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}

		# 2. User Service WebSockets (Online Status)
		location /ws/ {
			proxy_pass http://user_service:8001;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection $connection_upgrade;
			proxy_set_header Host $host;
			proxy_set_header Origin $http_origin; 
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_redirect off;
			proxy_buffering off;
			proxy_read_timeout 86400s;
			proxy_send_timeout 86400s;
		}

		# 3. Room Service
		location /api/room/ {
			proxy_pass http://combat_service:8003; 
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection "upgrade";
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}
		
		# 4. Combat Service REST
		location /api/combat/ {
			proxy_pass http://combat_service:8003;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}

		# 5. Play Service (WebSocket Senkronizasyonu)
		location /api/play {
			proxy_pass http://combat_service:8003; 
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection $connection_upgrade;
			proxy_set_header Host $host;
			proxy_cache_bypass $http_upgrade;
		}

		# 6. Game Service API (Sudoku Generator - C++)
		location /api/game/ {
			proxy_pass http://game_service:8080/;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection "upgrade";
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
		}

		# 7. Stats Service
		location /api/stats/ {
			proxy_pass http://stats_service:8090/api/stats/;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}

		# 8. User Service API (Auth & Profile)
		location /api/ {
			proxy_pass http://user_service:8001;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}

		# 9. Media Files
		# where to find those files on the local filesystem
		location /media/ {
			alias /var/www/media/;
		}
	}
}